name: Eventbrite Radar Bot
on:
  schedule:
    - cron: '0 1 * * *' # Chạy tự động lúc 1h sáng UTC (8h sáng VN) hàng ngày
  workflow_dispatch: # Cho phép cậu bấm nút chạy tay để kiểm tra

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Run Scraper
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper1.py
